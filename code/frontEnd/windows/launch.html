<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetTower</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="screen screen-launch">
  <main class="panel">
    <header class="panel-header">
      <h1>NetTower</h1>
      <p>Configure the scan session and start runtime services.</p>
    </header>

    <form id="session-config-form" class="form-grid">
      <label class="field">
        <span>Interface</span>
        <input id="interface" name="interface" type="text" placeholder="en0" />
      </label>

      <label class="field">
        <span>Discovery CIDR</span>
        <input
          id="discovery_target_cidr"
          name="discovery_target_cidr"
          type="text"
          placeholder="192.168.1.0/24"
        />
      </label>

      <label class="field checkbox-field">
        <input
          id="enable_passive_listener"
          name="enable_passive_listener"
          type="checkbox"
          checked
        />
        <span>Enable passive listener</span>
      </label>

      <label class="field checkbox-field">
        <input
          id="enable_active_discovery"
          name="enable_active_discovery"
          type="checkbox"
        />
        <span>Enable active discovery</span>
      </label>

      <label class="field">
        <span>Discovery interval seconds</span>
        <input
          id="discovery_interval_seconds"
          name="discovery_interval_seconds"
          type="number"
          min="1"
          value="120"
          required
        />
      </label>

      <label class="field">
        <span>Targeted scan cooldown seconds</span>
        <input
          id="targeted_scan_cooldown_seconds"
          name="targeted_scan_cooldown_seconds"
          type="number"
          min="0"
          value="300"
          required
        />
      </label>

      <button id="start-session-btn" type="submit" class="button-primary">
        Start Session
      </button>

      <div id="launch-loading" class="loading-indicator is-hidden" aria-live="polite">
        <span class="spinner" aria-hidden="true"></span>
        <span>Waiting for backend readiness...</span>
      </div>
    </form>

    <p id="launch-status" class="status status-info">Ready to start session.</p>
  </main>

  <script src="../js/launch_controller.js"></script>
</body>
</html>
